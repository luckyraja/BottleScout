<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#484551",
              "surface-container": "#eeeeee",
              "inverse-surface": "#2f3131",
              "primary-fixed-dim": "#cabeff",
              "surface-variant": "#e2e2e2",
              "on-secondary-fixed": "#1b163d",
              "on-tertiary": "#ffffff",
              "on-primary-container": "#f0eaff",
              "error-container": "#ffdad6",
              "tertiary-container": "#6c6b6b",
              "error": "#ba1a1a",
              "on-secondary-fixed-variant": "#47416b",
              "primary": "#544699",
              "on-secondary-container": "#5a5480",
              "inverse-primary": "#cabeff",
              "on-secondary": "#ffffff",
              "surface-dim": "#dadada",
              "outline": "#797582",
              "secondary-fixed-dim": "#c8c1f3",
              "on-primary-fixed": "#1c025f",
              "surface-bright": "#f9f9f9",
              "secondary-fixed": "#e5deff",
              "on-primary-fixed-variant": "#483a8b",
              "on-tertiary-container": "#efedec",
              "tertiary-fixed": "#e4e2e1",
              "on-background": "#1a1c1c",
              "primary-fixed": "#e6deff",
              "on-error": "#ffffff",
              "surface-container-highest": "#e2e2e2",
              "secondary-container": "#d3ccfe",
              "surface-tint": "#6052a5",
              "on-error-container": "#93000a",
              "outline-variant": "#c9c4d2",
              "surface-container-lowest": "#ffffff",
              "surface": "#f9f9f9",
              "primary-container": "#6d5fb3",
              "on-tertiary-fixed": "#1b1c1c",
              "on-primary": "#ffffff",
              "surface-container-high": "#e8e8e8",
              "surface-container-low": "#f4f3f3",
              "secondary": "#5f5985",
              "on-tertiary-fixed-variant": "#474747",
              "on-surface": "#1a1c1c",
              "inverse-on-surface": "#f1f1f1",
              "tertiary-fixed-dim": "#c8c6c6",
              "background": "#f9f9f9",
              "tertiary": "#535353"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .viewfinder-mask {
            background: rgba(0, 0, 0, 0.4);
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect width="100%" height="100%" fill="white"/><rect x="15%" y="20%" width="70%" height="50%" rx="24" fill="black"/></svg>');
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect width="100%" height="100%" fill="white"/><rect x="15%" y="20%" width="70%" height="50%" rx="24" fill="black"/></svg>');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-on-background font-body overflow-hidden">
<!-- Camera Viewfinder -->
<div class="relative h-screen w-full flex flex-col">
<!-- Live Camera Feed Simulation -->
<div class="absolute inset-0 z-0">
<img alt="Vintage wine bottle on a rustic wooden table" class="w-full h-full object-cover" data-alt="A close up of a luxury wine bottle on a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBv_ODsrBd-xLJOteOUBHmGGQZ1NFe8HoTx8EAw8DSO-7zUEbkOZM0TdD2fBvKmO6PeAsHS3TS1wTy0QfJJEojAuziCbyIwxt8LyFBOPR1Q5dG2tnOlUAD7xOLTeUE1W_I_uBFqMFf62xALymh-gFIAHQZwb7VVl02qtXH46K-DKFj26x1rMclc5QZG0ekED3KjGyOqA78u_Dm_70DliQyvntCZheKNaksa4uCbyet6MhXP4YMeAqylD0Qr8WkrqPh-Yp469TCdAc"/>
<!-- Viewfinder Overlay & Mask -->
<div class="absolute inset-0 viewfinder-mask backdrop-blur-[2px]"></div>
<!-- Target Frame -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-[70%] h-[50%] -mt-[10%] border-2 border-surface-container-lowest rounded-lg shadow-[0_0_0_2px_rgba(84,70,153,0.3)] flex flex-col items-center justify-center">
<div class="absolute top-4 left-4 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute top-4 right-4 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute bottom-4 left-4 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute bottom-4 right-4 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
<div class="bg-on-background/40 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
<span class="text-surface font-label text-[10px] uppercase tracking-[0.1em] font-bold">Align Bottle Label</span>
</div>
</div>
</div>
</div>
<!-- Top AppBar UI -->
<header class="relative z-20 flex justify-between items-center px-6 h-20 pt-4">
<button class="w-10 h-10 rounded-full bg-on-background/30 backdrop-blur-xl flex items-center justify-center text-surface active:scale-95 transition-transform">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex items-center gap-2 bg-on-background/30 backdrop-blur-xl px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-primary-fixed-dim text-sm" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="text-surface font-label text-[11px] font-bold uppercase tracking-wider">Auto Flash</span>
</div>
<button class="w-10 h-10 rounded-full bg-on-background/30 backdrop-blur-xl flex items-center justify-center text-surface active:scale-95 transition-transform">
<span class="material-symbols-outlined">flip_camera_ios</span>
</button>
</header>
<!-- Dynamic Scanner Content -->
<main class="relative z-10 flex-grow flex flex-col justify-end pb-48 px-8">
<div class="space-y-4">
<div class="inline-flex items-center gap-3 bg-primary/20 backdrop-blur-2xl border border-primary/30 p-1.5 pr-6 rounded-full">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-sm">auto_awesome</span>
</div>
<p class="text-surface text-sm font-medium">Scanning for vintage details...</p>
</div>
<h1 class="font-headline font-extrabold text-4xl text-surface leading-tight tracking-tight">
                    VINTAGE <br/> <span class="text-primary-fixed-dim">RECOGNITION</span>
</h1>
</div>
</main>
<!-- Camera Controls Dock -->
<footer class="fixed bottom-0 left-0 w-full z-30 px-6 pb-12 pt-8 bg-gradient-to-t from-on-background/90 to-transparent">
<div class="flex items-center justify-between max-w-md mx-auto">
<!-- Gallery Thumbnail -->
<div class="w-14 h-14 rounded-xl border-2 border-surface-container-highest/20 overflow-hidden bg-surface-container-highest shadow-lg active:scale-90 transition-transform">
<img alt="Recent photo thumbnail" class="w-full h-full object-cover" data-alt="A small thumbnail of a wine bottle photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3DZyqSFi8c5oP7F7oa8ibHNmS1BAe2IQy3kbF_5v33G6Im5LdOOsKt_jT7RvWO4vmtH6OhT1kc_dkX43AsAAAzHrTEv1B4V4mikjXX-nrXFlhTw88riXho3d7TmtVuMBVNO3Ijdt0pqgw2FxkEDLFjRgcwGLk_rpO1_LPeGLpJyz5BvYYa6DszjBOBoMMahBQbubuULcK3jNM2ZV1ArcX2fknmVCBe49t39PJHk3om4jeax0Dd5zJyyJwUS39qZeWxGuolNoUg2g"/>
</div>
<!-- Main Shutter -->
<div class="relative flex items-center justify-center">
<div class="absolute inset-0 bg-primary/20 rounded-full scale-125 blur-xl"></div>
<button class="relative w-20 h-20 rounded-full bg-surface-container-lowest p-1 shadow-2xl active:scale-90 transition-transform duration-200">
<div class="w-full h-full rounded-full border-[3px] border-primary/20 flex items-center justify-center">
<div class="w-14 h-14 rounded-full bg-gradient-to-b from-primary to-secondary shadow-inner"></div>
</div>
</button>
</div>
<!-- Mode Toggle (SNES Styled) -->
<div class="flex flex-col items-center gap-2">
<button class="w-14 h-14 rounded-full bg-on-background/30 backdrop-blur-xl flex items-center justify-center text-surface active:scale-90 transition-transform">
<span class="material-symbols-outlined">history</span>
</button>
<span class="text-[10px] text-surface-container-highest uppercase font-bold tracking-widest">Recent</span>
</div>
</div>
<!-- Mode Selector -->
<div class="mt-8 flex justify-center gap-8 overflow-hidden">
<span class="text-surface/40 font-label text-[11px] font-bold uppercase tracking-widest">Label</span>
<span class="text-primary-fixed-dim font-label text-[11px] font-bold uppercase tracking-widest relative">
                    Bottle
                    <span class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1 h-1 bg-primary rounded-full"></span>
</span>
<span class="text-surface/40 font-label text-[11px] font-bold uppercase tracking-widest">Cellar</span>
</div>
</footer>
<!-- Toast Notification (Top) -->
<div class="absolute top-24 left-1/2 -translate-x-1/2 z-40">
<div class="bg-surface-container-lowest/10 backdrop-blur-md border border-white/10 px-6 py-2 rounded-full shadow-2xl">
<p class="text-surface-container-lowest text-xs font-semibold tracking-wide">LIGHTING: OPTIMAL</p>
</div>
</div>
</div>
</body></html>
